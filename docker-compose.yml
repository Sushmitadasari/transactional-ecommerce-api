version: "3.9"

services:

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    env_file:
      - .env

  worker:
    build: .
    command: npm run worker
    depends_on:
      - redis
      - postgres
    env_file:
      - .env

volumes:
  postgres: